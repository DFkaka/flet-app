name: 编译 Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ANDROID_HOME: /opt/android-sdk
  ANDROID_SDK_ROOT: /opt/android-sdk
  FLUTTER_GIT_URL: https://github.com/flutter/flutter.git

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Flutter
        run: |
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          $HOME/flutter/bin/flutter config --android-sdk $ANDROID_HOME
          $HOME/flutter/bin/flutter config --no-analytics

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 Android SDK
        run: |
          sudo mkdir -p $ANDROID_HOME
          sudo chmod 777 $ANDROID_HOME
          cd $ANDROID_HOME
          curl -sL -o sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q sdk.zip
          yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-34" 2>&1 | tail -3
          yes | $HOME/flutter/bin/flutter doctor --android-licenses 2>&1 | tail -5

      - name: 安装 Flet
        run: pip install flet

      - name: 编译 APK
        run: echo "y" | flet build apk --org com.dfpos

      - name: 查找 APK
        run: find . -name "*.apk" | head -5

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 进销存查询-APK
          path: |
            build/apk/**/*.apk
            build/**/*.apk
