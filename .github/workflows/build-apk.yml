name: 编译 Android APK

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 Flet
        run: |
          pip install flet

      - name: 复制数据库文件
        run: |
          # 如果 flet_app 目录下没有 inventory.db，从项目根目录复制
          if [ ! -f flet_app/inventory.db ]; then
            cp inventory.db flet_app/ 2>/dev/null || true
          fi
          # 确认数据库存在
          ls -la flet_app/inventory.db || echo "警告: 没有 inventory.db"

      - name: 编译 APK
        run: |
          cd flet_app
          flet build apk --org com.dfpos

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 进销存查询-APK
          path: flet_app/build/apk/release/*.apk
